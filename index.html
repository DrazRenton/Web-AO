<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aberración Óptica | Rediseño Editorial 2026</title>
  
  <!-- Tailwind CSS para el estilado moderno e interactivo -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts: Inter para tipografía técnica y limpia -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
  
  <!-- Carga de React 18 & ReactDOM 18 UMD (Producción) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone para JSX (Versión de producción estable para evitar errores de ESM) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.17/babel.min.js"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #FFFFFF;
      color: #000000;
    }
    
    /* Efecto sutil de aberración óptica en hover */
    .lens-hover {
      position: relative;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .lens-hover::before, .lens-hover::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: all 0.5s ease;
      mix-blend-mode: screen;
    }
    .lens-hover:hover::before {
      opacity: 0.15;
      transform: translate(2px, 1px);
      background: radial-gradient(circle, rgba(255,0,0,0.5) 0%, transparent 100%);
    }
    .lens-hover:hover::after {
      opacity: 0.15;
      transform: translate(-2px, -1px);
      background: radial-gradient(circle, rgba(0,0,255,0.5) 0%, transparent 100%);
    }

    /* Scrollbar minimalista */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #FFFFFF;
    }
    ::-webkit-scrollbar-thumb {
      background: #000000;
    }
  </style>
</head>
<body class="antialiased selection:bg-black selection:text-white">

  <!-- Contenedor principal de la App -->
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect } = React;

    const MenuIcon = ({ size = 20, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <line x1="4" x2="20" y1="12" y2="12"></line>
        <line x1="4" x2="20" y1="6" y2="6"></line>
        <line x1="4" x2="20" y1="18" y2="18"></line>
      </svg>
    );

    const CloseIcon = ({ size = 20, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    );

    const PlayIcon = ({ size = 20, fill = "none", className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polygon points="5 3 19 12 5 21 5 3"></polygon>
      </svg>
    );

    const ArrowUpIcon = ({ size = 20, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <line x1="12" y1="19" x2="12" y2="5"></line>
        <polyline points="5 12 12 5 19 12"></polyline>
      </svg>
    );

    const ExternalLinkIcon = ({ size = 16, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
        <polyline points="15 3 21 3 21 9"></polyline>
        <line x1="10" y1="14" x2="21" y2="3"></line>
      </svg>
    );

    const EyeIcon = ({ size = 16, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
    );

    const TrophyIcon = ({ size = 16, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path>
        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path>
        <path d="M4 22h16"></path>
        <path d="M10 14.66V17c0 .55-.45 1-1 1H4v2h16v-2h-5c-.55 0-1-.45-1-1v-2.34"></path>
        <path d="M12 2a6.37 6.37 0 0 1 6 6.6c0 4.14-3.36 7.4-7.5 7.4-4.14 0-7.5-3.26-7.5-7.4A6.37 6.37 0 0 1 12 2z"></path>
      </svg>
    );

    const VimeoIcon = ({ size = 18, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className} xmlns="http://www.w3.org/2000/svg">
        <path d="M22.396 7.158c-.147 3.27-2.433 7.747-6.858 13.433-4.545 5.86-8.384 8.788-11.517 8.788-1.954 0-3.606-1.8-4.954-5.399-.901-3.33-1.802-6.661-2.704-9.991-.977-3.606-2.028-5.41-3.155-5.41-.225 0-.977.451-2.253 1.352l-1.352-1.802c1.428-1.277 2.855-2.553 4.283-3.829 1.954-1.652 3.418-2.516 4.395-2.59 2.253-.225 3.642 1.314 4.168 4.619.563 3.568 1.014 5.783 1.352 6.647.788 3.23 1.653 4.845 2.592 4.845.713 0 1.577-1.127 2.591-3.38.977-3.23 1.503-5.671 1.503-7.324 0-2.329-.676-3.493-2.028-3.493-.676 0-1.465.15-2.367.451 1.427-4.657 4.131-6.985 8.112-6.985 2.929 0 4.319 1.953 4.169 5.86z" transform="scale(0.8) translate(3, 2)"/>
      </svg>
    );

    const ChevronDownIcon = ({ size = 20, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    );

    const InstagramIcon = ({ size = 18 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
      </svg>
    );

    const FacebookIcon = ({ size = 18 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
      </svg>
    );

    const YoutubeIcon = ({ size = 18 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z"></path>
        <polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02" fill="currentColor"></polygon>
      </svg>
    );

    const Header = ({ view, setView, setSelectedProject, setMenuOpen, logoUrl, t, lang, setLang }) => (
      <header className="fixed top-0 left-0 w-full z-50 transition-all duration-500 bg-white/90 border-b border-neutral-200 backdrop-blur-md px-6 py-4 flex justify-between items-center select-none">
        <div className="flex items-center cursor-pointer" onClick={() => { setView('home'); if (setSelectedProject) setSelectedProject(null); setMenuOpen(false); window.scrollTo(0,0); }}>
          <img 
            src={logoUrl} 
            alt={lang === 'es' ? "Logotipo de Aberración Óptica - Productora Audiovisual y Renta de Equipo" : "Aberración Óptica Logo - Film Production and Equipment Rental"} 
            className="h-8 md:h-10 w-auto object-contain" 
          />
        </div>
        
        <div className="flex items-center space-x-6 uppercase font-bold text-[10px] tracking-[0.3em]">
          <nav className="hidden lg:flex space-x-4 xl:space-x-6 text-black/60">
            {['largos', 'cortos', 'videoclips', 'series', 'publicidad', 'servicios', 'renta', 'nosotros', 'contacto'].map(v => (
              <button 
                key={v} 
                onClick={() => { setView(v); if (setSelectedProject) setSelectedProject(null); window.scrollTo(0,0); }} 
                className={`transition-all hover:text-black ${view === v ? 'text-black border-b border-black font-black' : ''}`}
              >
                {t.nav[v]}
              </button>
            ))}
          </nav>
          
          <div className="flex items-center space-x-2 border-l border-neutral-200 pl-4 h-4 text-black/40">
             <button onClick={() => setLang('es')} className={`transition-all hover:text-black ${lang === 'es' ? 'text-black font-black' : ''}`}>ES</button>
             <span>|</span>
             <button onClick={() => setLang('en')} className={`transition-all hover:text-black ${lang === 'en' ? 'text-black font-black' : ''}`}>EN</button>
          </div>

          <button onClick={() => setMenuOpen(true)} className="flex items-center space-x-2 hover:opacity-75 transition-opacity text-black">
            <span>Menu</span>
            <MenuIcon size={18} />
          </button>
        </div>
      </header>
    );

    const SitemapModal = ({ sitemapOpen, setSitemapOpen, setView }) => (
      <div 
        style={{ display: sitemapOpen ? 'flex' : 'none' }}
        className={`fixed inset-0 bg-white/95 z-[210] backdrop-blur-md flex items-center justify-center transition-all duration-500 ${sitemapOpen ? 'opacity-100 visible pointer-events-auto' : 'opacity-0 invisible pointer-events-none'}`}
      >
        <div className="max-w-4xl w-full p-8 relative">
          <button onClick={() => setSitemapOpen(false)} className="absolute top-4 right-4 text-neutral-400 hover:text-black transition-colors">
            <CloseIcon size={24} />
          </button>
          <h3 className="text-sm font-black tracking-[0.5em] text-neutral-400 mb-8 uppercase">SITEMAP / ARQUITECTURA WEB</h3>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-8 text-left text-neutral-800">
            <div>
              <h4 className="font-bold border-b border-black pb-2 mb-4 text-black">CONTENIDO</h4>
              <ul className="space-y-2 text-xs uppercase tracking-wider">
                <li><button onClick={() => { setView('home'); setSitemapOpen(false); }} className="hover:underline">Home</button></li>
                <li><button onClick={() => { setView('nosotros'); setSitemapOpen(false); }} className="hover:underline">Nosotros</button></li>
                <li><button onClick={() => { setView('servicios'); setSitemapOpen(false); }} className="hover:underline">Servicios</button></li>
                <li><button onClick={() => { setView('contacto'); setSitemapOpen(false); }} className="hover:underline">Contacto</button></li>
              </ul>
            </div>
            <div>
              <h4 className="font-bold border-b border-black pb-2 mb-4 text-black">PORTAFOLIO</h4>
              <ul className="space-y-2 text-xs uppercase tracking-wider">
                <li><button onClick={() => { setView('largos'); setSitemapOpen(false); }} className="hover:underline">Largometrajes</button></li>
                <li><button onClick={() => { setView('cortos'); setSitemapOpen(false); }} className="hover:underline">Cortometrajes</button></li>
                <li><button onClick={() => { setView('videoclips'); setSitemapOpen(false); }} className="hover:underline">Videoclips</button></li>
                <li><button onClick={() => { setView('series'); setSitemapOpen(false); }} className="hover:underline">Series Documentales</button></li>
                <li><button onClick={() => { setView('publicidad'); setSitemapOpen(false); }} className="hover:underline">Publicidad</button></li>
              </ul>
            </div>
            <div>
              <h4 className="font-bold border-b border-black pb-2 mb-4 text-black">ESTUDIO & RENTA</h4>
              <ul className="space-y-2 text-xs uppercase tracking-wider">
                <li><button onClick={() => { setView('renta'); setSitemapOpen(false); }} className="hover:underline">Catálogo de Renta</button></li>
                <li><a href="https://wa.me/525563172017" target="_blank" className="hover:underline block">WhatsApp Comercial</a></li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    );

    const NavigationOverlay = ({ menuOpen, setMenuOpen, setView, logoUrl, t, setSitemapOpen, lang }) => (
      <div 
        style={{ display: menuOpen ? 'block' : 'none' }}
        className={`fixed inset-0 bg-white z-[200] transition-all duration-700 ease-in-out ${menuOpen ? 'translate-y-0 opacity-100 visible pointer-events-auto' : '-translate-y-full opacity-0 invisible pointer-events-none'}`}
      >
        <div className="h-full flex flex-col p-8 md:p-16 overflow-y-auto uppercase text-black font-sans">
          <div className="flex justify-between items-center mb-12">
            <img 
              src={logoUrl} 
              alt={lang === 'es' ? "Logotipo de Aberración Óptica" : "Aberración Óptica Logo"} 
              className="h-8 md:h-10 w-auto object-contain" 
            />
            <button onClick={() => setMenuOpen(false)} className="p-3 hover:bg-neutral-100 rounded-full transition-colors">
              <CloseIcon size={24} />
            </button>
          </div>
          
          <div className="grid grid-cols-1 md:grid-cols-2 gap-12 max-w-7xl mx-auto w-full my-auto text-left">
            <div className="flex flex-col space-y-4">
              <span className="text-[10px] tracking-[0.5em] text-neutral-400 font-bold">CATEGORÍAS</span>
              {['largos', 'cortos', 'videoclips', 'series', 'publicidad'].map((key) => (
                <button 
                  key={key} 
                  onClick={() => { setView(key); setMenuOpen(false); window.scrollTo(0,0); }} 
                  className="text-4xl md:text-6xl tracking-tighter hover:italic hover:pl-4 transition-all duration-300 font-light text-neutral-400 hover:text-black text-left"
                >
                  {t.nav[key]}
                </button>
              ))}
            </div>
            
            <div className="flex flex-col justify-between">
              <div className="flex flex-col space-y-4">
                <span className="text-[10px] tracking-[0.5em] text-neutral-400 font-bold">ESTUDIO</span>
                {['servicios', 'renta', 'nosotros', 'contacto'].map((key) => (
                  <button 
                    key={key} 
                    onClick={() => { setView(key); setMenuOpen(false); window.scrollTo(0,0); }} 
                    className="text-3xl md:text-5xl tracking-tighter hover:italic hover:pl-4 transition-all duration-300 font-light text-neutral-400 hover:text-black text-left"
                  >
                    {t.nav[key]}
                  </button>
                ))}
              </div>
              
              <div className="mt-12 pt-8 border-t border-neutral-100 flex justify-between items-center text-[10px] tracking-widest text-neutral-400">
                <button onClick={() => { setSitemapOpen(true); setMenuOpen(false); }} className="hover:text-black transition-colors font-bold">VER SITEMAP JERÁRQUICO</button>
                <span>© Aberración Óptica 2026</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    );

    const CategoryListView = ({ type, title, projects, setSelectedProject, setView, t, lang }) => {
      const searchType = type.toUpperCase() === 'VIDEOCLIPS' ? 'VIDEOCLIP' : 
                         type === 'largos' ? 'LARGOMETRAJE' : 
                         type === 'cortos' ? 'CORTO' : 
                         type.toUpperCase();
      
      const displayList = projects.filter(p => p.category === searchType);
      
      return (
        <div className="bg-[#F7F7F7] min-h-screen pt-36 pb-24">
          <div className="max-w-7xl mx-auto px-6">
            <div className="mb-16 border-b border-neutral-200 pb-8 flex justify-between items-end">
              <div>
                <span className="text-[9px] uppercase tracking-[0.5em] text-neutral-400 block mb-2 font-bold">FILMOGRAFÍA SELECCIONADA</span>
                <h2 className="text-4xl md:text-7xl uppercase tracking-tighter italic font-light text-neutral-900">{title}</h2>
              </div>
              <span className="text-xs uppercase tracking-widest text-neutral-400 font-bold">{displayList.length} Obras</span>
            </div>
            
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-12">
              {displayList.map((proj) => (
                <div 
                  key={proj.id} 
                  className="group cursor-pointer flex flex-col bg-white border border-neutral-100 p-4 rounded-lg lens-hover shadow-sm" 
                  onClick={() => { setSelectedProject(proj); setView('project'); window.scrollTo(0,0); }}
                >
                  <div className="w-full aspect-[2/3] overflow-hidden bg-neutral-100 relative mb-6 rounded">
                    <img 
                      src={proj.poster} 
                      className="w-full h-full object-cover transition-transform duration-[1.2s] group-hover:scale-105" 
                      alt={lang === 'es' ? `Póster de la producción cinematográfica: ${proj.title}` : `Official poster for the film: ${proj.title}`} 
                    />
                    <div className="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors duration-500"></div>
                  </div>
                  <div className="text-left space-y-1">
                    <div className="text-[9px] uppercase tracking-[0.3em] text-neutral-400 font-bold">{proj.year}</div>
                    <h3 className="text-xl md:text-2xl uppercase tracking-tighter group-hover:italic transition-all leading-none font-bold text-neutral-950">{proj.title}</h3>
                    <p className="text-xs text-neutral-500 truncate">{proj.genre}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    const ProjectView = ({ project, galleryState, setGalleryState, setView, t, lang }) => {
      const activeGallery = galleryState.index !== null ? (galleryState.type === 'stills' ? project.stills : project.makingOf) : [];

      const getHeroLink = () => {
        if (!project.showIframe && project.trailerUrl) {
          if (project.trailerUrl.includes('youtube.com/embed/')) {
            return project.trailerUrl.replace('youtube.com/embed/', 'youtube.com/watch?v=');
          }
          if (project.trailerUrl.includes('player.vimeo.com/video/')) {
            return project.trailerUrl.replace('player.vimeo.com/video/', 'vimeo.com/').split('?')[0];
          }
          return project.trailerUrl;
        }
        return project.movieUrl || project.trailerUrl;
      };

      const heroLink = getHeroLink();

      return (
        <div className="bg-white min-h-screen pt-20 pb-20 overflow-x-hidden">
          {galleryState.index !== null && (
            <div className="fixed inset-0 z-[500] bg-black/95 backdrop-blur-md flex flex-col items-center justify-center p-4 select-none cursor-default" onClick={() => setGalleryState({ index: null, type: 'stills' })}>
              <div className="absolute inset-y-0 left-0 w-20 md:w-32 flex items-center justify-center z-[510]">
                <button onClick={(e) => { e.stopPropagation(); setGalleryState(prev => ({ ...prev, index: (prev.index - 1 + activeGallery.length) % activeGallery.length })); }} className="w-full h-full text-[10px] uppercase tracking-[0.3em] font-bold text-white/30 hover:text-white transition-all">Anterior</button>
              </div>
              <div className="absolute inset-y-0 right-0 w-20 md:w-32 flex items-center justify-center z-[510]">
                <button onClick={(e) => { e.stopPropagation(); setGalleryState(prev => ({ ...prev, index: (prev.index + 1) % activeGallery.length })); }} className="w-full h-full text-[10px] uppercase tracking-[0.3em] font-bold text-white/30 hover:text-white transition-all">Siguiente</button>
              </div>
              <div className="relative max-w-5xl w-full flex items-center justify-center" onClick={(e) => e.stopPropagation()}>
                <img 
                  key={activeGallery[galleryState.index]} 
                  src={`https://lh3.googleusercontent.com/d/${activeGallery[galleryState.index]}`} 
                  className="max-h-[80vh] w-auto shadow-2xl rounded object-contain" 
                  alt={lang === 'es' ? `Fotograma de producción de la obra ${project.title}` : `Behind the scenes still from ${project.title}`}
                />
                <div className="absolute -bottom-10 left-0 right-0 text-center text-white/40 text-[9px] uppercase tracking-[1em] font-bold">{galleryState.type.toUpperCase()} 0{galleryState.index + 1} / 0{activeGallery.length}</div>
              </div>
              <button onClick={(e) => { e.stopPropagation(); setGalleryState({ index: null, type: 'stills' }); }} className="absolute top-8 right-8 text-white/50 hover:text-white transition-all p-3 z-[550]"><CloseIcon size={24}/></button>
            </div>
          )}

          <div className="max-w-7xl mx-auto px-6 pt-12">
            <div className="relative aspect-[21/9] w-full bg-neutral-900 border border-neutral-800 overflow-hidden shadow-2xl rounded-lg">
              {project.showIframe ? (
                <iframe src={project.trailerUrl} className="w-full h-full" frameBorder="0" allow="autoplay; fullscreen; picture-in-picture" allowFullScreen></iframe>
              ) : (
                <>
                  <img 
                    src={project.heroImage || project.poster} 
                    alt={lang === 'es' ? `Imagen destacada del proyecto: ${project.title}` : `Hero screenshot of the film: ${project.title}`} 
                    className="w-full h-full object-cover grayscale opacity-40 transition-transform duration-[2s] hover:scale-105" 
                  />
                  <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                  {heroLink && (
                    <a href={heroLink} target="_blank" rel="noopener noreferrer" className="group absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-10 p-8 rounded-full border border-white/20 hover:border-white transition-all bg-black/40 backdrop-blur-sm shadow-2xl">
                      <PlayIcon fill="white" size={32} className="ml-1 text-white" />
                    </a>
                  )}
                </>
              )}
              <div className="absolute bottom-6 left-6 text-left">
                <span className="text-[10px] uppercase tracking-[0.4em] text-white/60 font-bold">{project.category} / {project.year}</span>
                <h1 className="text-3xl md:text-5xl uppercase tracking-tighter text-white font-black leading-none">{project.title}</h1>
              </div>
